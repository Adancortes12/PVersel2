<!DOCTYPE html>
<html>

<head>

<title>Reportes de Fallas</title>

<style>

body{
font-family: Arial;
padding:40px;
background:#f4f4f4;
}

table{
border-collapse: collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#222;
color:white;
}

img{
border:1px solid #ccc;
}

</style>

</head>

<body>

<h1>Reportes de Falla Recibidos</h1>

<table id="tabla">

<thead>

<tr>
<th>ID</th>
<th>Vehiculo</th>
<th>Fecha</th>
<th>Latitud</th>
<th>Longitud</th>
<th>Descripcion</th>
<th>Firma</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script>

async function cargar(){

const res = await fetch("/api/reports");
const data = await res.json();

const tabla = document.querySelector("#tabla tbody");

tabla.innerHTML="";

data.forEach(r=>{

tabla.innerHTML += `

<tr>

<td>${r.id}</td>

<td>${r.id_vehiculo}</td>

<td>${r.fecha}</td>

<td>${r.latitud}</td>

<td>${r.longitud}</td>

<td>${r.descripcion_falla}</td>

<td>
<img src="data:image/png;base64,${r.firma_conductor_base64}" width="150"/>
</td>

</tr>

`;

});

}

setInterval(cargar,2000);

</script>

</body>
</html>
